services:
  postgres:
    image: postgres:16-alpine
    container_name: aiassist-postgres
    environment:
      POSTGRES_DB: ai_assist
      POSTGRES_USER: aiassist
      POSTGRES_PASSWORD: aiassist
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiassist -d ai_assist"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    environment:
      DATABASE_URL: postgresql+psycopg://aiassist:aiassist@postgres:5432/ai_assist
      AUTO_CREATE_DB_SCHEMA: "false"
    command: >
      sh -c "python -m alembic -c backend/alembic.ini upgrade head &&
      python -m uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port 8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
